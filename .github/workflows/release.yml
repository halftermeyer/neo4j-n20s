name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set version in all modules
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DprocessAllModules -DgenerateBackupPoms=false

      - name: Build and test all modules
        run: mvn clean package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            n20s-plugin/target/n20s-plugin-${{ steps.version.outputs.VERSION }}.jar
            n20s-server/target/n20s-server-${{ steps.version.outputs.VERSION }}.jar
          generate_release_notes: true
