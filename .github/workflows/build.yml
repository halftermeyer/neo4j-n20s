name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn clean package

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: n20s-plugin
          path: n20s-plugin/target/n20s-plugin-*.jar
          if-no-files-found: error

      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: n20s-server
          path: n20s-server/target/n20s-server-*.jar
          if-no-files-found: error
